# Full Dataset Training Config

data:
  # Data directories (shared for train/val)
  image_dir: ./data/aneurysm_dataset/images
  mask_dir: ./data/aneurysm_dataset/masks
  pointcloud_dir: ./data/aneurysm_dataset/pointclouds
  
  # Case list files
  train_list: ./data/aneurysm_dataset/train.txt
  val_list: ./data/aneurysm_dataset/val.txt
  
  # Data loading
  batch_size: 4        # Per GPU
  num_workers: 16
  preload: false
  
  # Point cloud sampling
  num_points: null     # Use all available points in patch (no limit)
  patch_size: [96, 96, 96]
  window_level: 450
  window_width: 900
  
  # Sampling per case per epoch
  pos_patches: 12      # Positive patches (aneurysm-centered)
  neg_patches: 12      # Negative patches (random location)
  min_points_in_patch: 0

model:
  voxel_size: [96, 96, 96]
  use_geometry: true
  min_points_for_geo: 128
  
  gfe:
    k_small: 8
    k_large: 32
  
  p2v:
    sigma: 1.0
    kernel_radius: 2
    fast: false

  fusion:
    reduction: 4
    alpha_init: 0.1
  
  backbone:
    embed_dim: 48
    depths: [2, 2, 2, 2]
    num_heads: [3, 6, 12, 24]
    use_checkpoint: true
  
  head:
    out_channels: 2

loss:
  dice_weight: 1.0
  ce_weight: 1.0
  lambda_prior: 0.0
  lambda_boundary: 0.0
  point_weight: 1.0
  radius: 3

train:
  epochs: 1500
  lr: 1.0e-4
  weight_decay: 1.0e-5
  amp: true
  grad_clip: 1.0
  grad_accum: 2       # Gradient accumulation steps
  save_interval: 25   # Save checkpoint every 25 epochs
  
  scheduler:
    name: cosine
    warmup_epochs: 10
    min_lr: 1.0e-6

val:
  interval: 1  # Validate every epoch
  min_lesion_voxels: 5  # Filter out connected components smaller than this

output:
  log_dir: logs
  ckpt_dir: ckpts
  save_best: true
  save_last: true

wandb:
  project: GeoP2VNet
  entity: null
